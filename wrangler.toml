name = "chitty-landing"
compatibility_date = "2026-03-16"
pages_build_output_dir = "dist"

[site]
bucket = "./dist"

[[tail_consumers]]
service = "chittytrack"

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
destinations = ["chittytrack-logs"]

[observability.traces]
enabled = true
head_sampling_rate = 1
destinations = ["chittytrack-traces"]
persist = false
